services:
  alphaclaw:
    image: ghcr.io/your-org/alphaclaw:0.8.7-starfoundry.1
    # Prefer digest pinning in production once an image has been published:
    # image: ghcr.io/your-org/alphaclaw@sha256:replace-with-published-digest
    container_name: alphaclaw
    restart: unless-stopped
    env_file:
      - ./data/.env
    environment:
      ALPHACLAW_ROOT_DIR: /data
      PORT: "3000"
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:3000:3000"
