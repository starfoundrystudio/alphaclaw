name: Publish Docker Image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:ui

      - run: npm test

      - name: Prepare image tags
        id: meta
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          version="${GITHUB_REF_NAME#v}"
          short_sha="${GITHUB_SHA::12}"

          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${image}:${version}"
            echo "${image}:sha-${short_sha}"
            if [[ "${version}" != *-* ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=AlphaClaw
            org.opencontainers.image.description=Setup UI, gateway manager, and onboarding wrapper for OpenClaw
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Write job summary
        run: |
          {
            echo "## Published image"
            echo
            echo "- Image: \`${{ steps.meta.outputs.image }}\`"
            echo "- Version tag: \`${{ steps.meta.outputs.version }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "### Tags"
            echo '${{ steps.meta.outputs.tags }}' | while IFS= read -r tag; do
              [[ -z "${tag}" ]] && continue
              echo "- \`${tag}\`"
            done
          } >> "${GITHUB_STEP_SUMMARY}"
